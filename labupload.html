<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Health Messenger | PDF Analyzer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter}
body{background:#f8fafc;color:#0f172a}

header{background:#fff;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.navbar{max-width:1200px;margin:auto;padding:14px 20px}
.logo{font-size:20px;font-weight:700;color:#16a34a}

.hero{background:linear-gradient(90deg,#16a34a,#22c55e);padding:60px 20px;text-align:center;color:#fff}
.hero h1{font-size:34px}

.container{max-width:900px;margin:-40px auto 60px;padding:0 20px}
.card{background:#fff;padding:30px;border-radius:16px;box-shadow:0 15px 40px rgba(0,0,0,.1);text-align:center}

button{padding:12px 24px;border:none;border-radius:30px;font-weight:600;cursor:pointer}
.primary{background:#16a34a;color:#fff}
.success{background:#2563eb;color:#fff}

.preview{display:none;margin-top:40px}
iframe{width:100%;height:420px;border:none;border-radius:12px}

table{width:100%;margin-top:20px;border-collapse:collapse}
th,td{border:1px solid #e5e7eb;padding:10px;text-align:center}
th{background:#f1f5f9}
.normal{background:#dcfce7}
.abnormal{background:#fee2e2}

footer{background:#0f172a;color:#cbd5e1;margin-top:80px;text-align:center;padding:20px;font-size:14px}
</style>
</head>

<body>

<header>
  <div class="navbar">
    <div class="logo">Health Messenger</div>
  </div>
</header>

<section class="hero">
  <h1>PDF Upload & Analyzer</h1>
  <p>Upload lab report → Analyze → Share via WhatsApp</p>
</section>

<div class="container">

  <div class="card">
    <h2>Upload Lab Report (PDF)</h2><br>
    <input type="file" id="pdfFile" accept="application/pdf"><br><br>
    <button class="primary" onclick="analyzePDF()">Analyze Report</button>
  </div>

  <div class="preview" id="preview">
    <h2>Report Preview</h2>
    <iframe id="pdfPreview"></iframe>

    <h3 style="margin-top:30px">Test Analysis</h3>
    <table>
      <thead>
        <tr>
          <th>Test</th>
          <th>Value</th>
          <th>Range</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="resultBody"></tbody>
    </table>

    <br>
    <button class="success" onclick="sendToWhatsApp()">
      Send Summary to WhatsApp
    </button>
  </div>

</div>

<footer>
  © 2025 Health Messenger • Reports delivered securely via WhatsApp
</footer>

<script>
let hasAbnormal=false;

/* SAMPLE ANALYSIS DATA */
const tests=[
  {name:"Hemoglobin",value:13.5,min:13,max:17},
  {name:"Blood Sugar",value:160,min:70,max:140},
  {name:"Cholesterol",value:180,min:0,max:200}
];

function analyzePDF(){
  const file=document.getElementById("pdfFile").files[0];
  if(!file){alert("Upload PDF first");return;}

  document.getElementById("pdfPreview").src=URL.createObjectURL(file);
  document.getElementById("preview").style.display="block";

  const tbody=document.getElementById("resultBody");
  tbody.innerHTML="";
  hasAbnormal=false;

  tests.forEach(t=>{
    let status="NORMAL",cls="normal";
    if(t.value<t.min||t.value>t.max){
      status="ABNORMAL";
      cls="abnormal";
      hasAbnormal=true;
    }
    tbody.innerHTML+=`
      <tr class="${cls}">
        <td>${t.name}</td>
        <td>${t.value}</td>
        <td>${t.min}-${t.max}</td>
        <td>${status}</td>
      </tr>`;
  });
}

function sendToWhatsApp(){
  const phone="919985656006";
  const patient="Patient";

  const englishSummary = hasAbnormal
    ? "⚠️ Some values are abnormal. Please consult your doctor."
    : "✅ All values are within the normal range.";

  const teluguSummary = hasAbnormal
    ? "⚠️ కొన్ని విలువలు సాధారణ స్థాయికి బయట ఉన్నాయి. దయచేసి డాక్టర్‌ను సంప్రదించండి."
    : "✅ అన్ని విలువలు సాధారణ స్థాయిలో ఉన్నాయి.";

  const message =
`Hello ${patient},

Your lab report is ready ✅

📄 Please find the attached PDF report.

${englishSummary}

తెలుగు:
${teluguSummary}

– Health Messenger`;

  const url=`https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
  window.open(url,"_blank");
}
</script>

</body>
</html>
